services:

  database:
    build: ./database
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: fastapi_container
    restart: always
    depends_on:
      - database
    environment:
      DB_HOST: database
      DB_NAME: appdb
      DB_USER: admin
      DB_PASSWORD: secret
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: